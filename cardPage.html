<!DOCTYPE html>
<html lang="en">


<head>


    <link rel="stylesheet" href="styles.css">
    <script>
        // Check local storage and apply dark-mode class immediately if needed.
        // (document.body doesn't exist yet here, so only <html> can be tagged;
        // the body itself is tagged right after its opening tag, below.)
        const isDarkMode = localStorage.getItem('darkMode') === 'enabled';
        if (isDarkMode) {
            document.documentElement.classList.add('dark-mode');
        }

        // Optional: Update favicon immediately if you want
        window.changeFavicon = (href) => {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.getElementsByTagName('head')[0].appendChild(link);
            }
            link.href = href;
        };

        // Apply initial favicon based on mode
        if (isDarkMode) {
            window.changeFavicon("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>");
        } else {
            window.changeFavicon("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>");
        }

    </script>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="dynamic-favicon" rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
    <title>Andela Pokédex</title>
</head>

<body id="card-page">
<script>
    if (isDarkMode) document.body.classList.add('dark-mode');
</script>

<div id="typeColorOverlay"></div>


<div class="banner-card">
    <div class="arrow-left">
            <button class="arrow" onclick="navigatePokemon('previous')" aria-label="Previous Pokémon">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg> <span id="previousPokemonNumber"></span> <span id="previousPokemonName"></span>
            </button>
        <span id="previousPokemonInfo" class="pokemon-info"></span>
    </div>
    <div class="pokemon-info" id="currentPokemonInfo"></div>


    <div class="arrow-right">
            <button class="arrow" onclick="navigatePokemon('next')" aria-label="Next Pokémon">
                <span id="nextPokemonNumber"></span> <span id="nextPokemonName"> </span> <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>

            </button>
        <span id="nextPokemonInfo" class="pokemon-info"></span>
    </div>
</div>


<div id="pokemonTitleTypeContainer"></div>
<div id="pokemonCardContainer" class="pokemon-card-container">
    <div id="pokemonCardLeft" class="pokemon-card-left"></div>
    <div id="pokemonCardRight" class="pokemon-card-right"></div>



</div>


<button class="exit-button" onclick="window.location.href='index.html'" aria-label="Back to Pokédex"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

<button class="toggle-dark-mode-card" onclick="toggleDarkMode('.toggle-dark-mode-card')"></button>


<script type="module" src="cardPage.js"></script>
<script src="darkMode.js"></script>

</body>
</html>
