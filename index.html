<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <link id="dynamic-favicon" rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>'">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andela Pokédex</title>


    <!-- Both are ~500 bytes; preloading both unconditionally avoids a mismatch
         with the site's manual (localStorage-based) dark mode toggle, which
         prefers-color-scheme can't detect. -->
    <link rel="preload" href="assets/Bg_Light.svg" as="image">
    <link rel="preload" href="assets/Bg_Dark.svg" as="image">
</head>
<body>

<button class="toggle-dark-mode" onclick="toggleDarkMode('.toggle-dark-mode')"></button>


<header>
    <div class="banner-main">
        <h1>Andela Pokédex</h1>
        <button id="searchToggleBtn" class="search-toggle-btn" title="Search & Filter">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15.5" y2="15.5"/></svg>
        </button>
    </div>
</header>

<div class="search-filter-bar">
    <div class="search-wrapper">
        <svg class="icon-svg search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15.5" y2="15.5"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search Pokémon…" autocomplete="off" aria-label="Search Pokémon">
        <span id="resultCount" class="result-count-badge"></span>
    </div>
    <div id="typeFilterContainer" class="type-filter-container"></div>
</div>

<main id="pokedex">
</main>
<h3>◆ Xenos and Megas ◆</h3>
<main id="megadex">
</main>

<script src="index.js" type="module"></script>
<script src="darkMode.js"></script>

<footer class="footer">
    <p>&copy; 2026 Pokémon Project. All rights reserved. This is a fan-made project and is not affiliated with or
        endorsed by Pokémon, Nintendo, Game Freak, or any related entities.</p>
</footer>

<button id="backToTop" class="back-to-top" title="Back to top">
    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
</button>

<script>

    // Set initial icon and mode based on the saved state
    document.addEventListener('DOMContentLoaded', () => {
        setDarkModeFromStorage('.toggle-dark-mode');
    });
</script>
</body>
</html>
